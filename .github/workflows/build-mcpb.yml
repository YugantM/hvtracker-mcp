name: Build MCPB

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci --omit=dev
      - run: npx @anthropic-ai/mcpb@2.1.2 pack
      - uses: actions/upload-artifact@v7
        with:
          name: hvtracker-mcpb
          path: "*.mcpb"
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "*.mcpb"
