name: Publish MCP Registry

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Download MCP Publisher
        run: |
          set -euo pipefail
          tag="$(curl -fsSL https://api.github.com/repos/modelcontextprotocol/registry/releases/latest | python -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          asset="mcp-publisher_${os}_${arch}.tar.gz"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${tag}/${asset}" -o mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
