name: Publish Docker Hub

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish, e.g. v0.1.2"
        required: true
        default: "v0.1.2"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "tag=$version" >> "$GITHUB_OUTPUT"
          echo "plain=${version#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.version.outputs.tag }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hvtracker-mcp:${{ steps.version.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hvtracker-mcp:${{ steps.version.outputs.plain }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hvtracker-mcp:latest
