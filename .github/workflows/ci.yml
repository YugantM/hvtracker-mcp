name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: python -m ruff check .
      - run: python -m build
      - run: npm ci
      - run: npm test
      - run: npm run pack:check
